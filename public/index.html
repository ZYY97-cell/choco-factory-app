<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="巧克力工厂">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#8B4513">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">
  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg">
  <title>🍫 巧克力工厂生产管控</title>
  <link rel="stylesheet" href="/css/style.css?v=2">
  <style>
    /* 桌面端适配 */
    @media (min-width: 481px) {
      body {
        border-left: 1px solid #e0e0e0;
        border-right: 1px solid #e0e0e0;
        box-shadow: 0 0 30px rgba(0,0,0,0.08);
      }
    }
    /* iOS安全区域 */
    @supports (padding: env(safe-area-inset-bottom)) {
      .tab-bar {
        padding-bottom: env(safe-area-inset-bottom);
      }
      .app-container {
        padding-bottom: calc(70px + env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body>
  <div id="app" class="app-container">
    <div class="loading" id="loading-screen">
      <div class="loading-spinner"></div>
      <div>加载中...</div>
    </div>
  </div>
  <script>
    // 兜底安全网：5秒后如果还在加载，直接显示登录页
    setTimeout(function(){
      var el = document.getElementById('loading-screen');
      if (el && el.parentNode) {
        el.parentNode.innerHTML = '<div class="login-page"><div class="login-logo">🍫</div><div class="login-title">巧克力工厂生产管控</div><div class="login-subtitle">全流程线上流转管理系统</div><div class="login-form"><div class="form-group"><label>账号</label><input class="form-input" id="fb-username" placeholder="请输入用户名" autocomplete="username"></div><div class="form-group"><label>密码</label><input class="form-input" id="fb-password" type="password" placeholder="请输入密码"></div><button class="btn btn-primary" onclick="var x=document.getElementById(\'fb-username\').value.trim();var p=document.getElementById(\'fb-password\').value.trim();fetch(\'/api/login\',{method:\'POST\',headers:{\'Content-Type\':\'application/json\'},body:JSON.stringify({username:x,password:p})}).then(function(r){return r.json()}).then(function(d){if(d.success){location.reload()}else{alert(d.msg||\'登录失败\')}})">登 录</button></div></div>';
      }
    }, 5000);
  </script>
  <script src="/js/app.js?v=5" onerror="document.getElementById('loading-screen').innerHTML='<div style=text-align:center;padding:40px><p>应用加载失败</p><p style=font-size:12px;color:#999>请刷新页面重试，或清除浏览器缓存</p></div>'"></script>
  <script>
    // 清除旧版 Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(reg) { reg.unregister(); });
      }).then(function() {
        navigator.serviceWorker.register('/sw.js').catch(function(){});
      });
    }
  </script>
</body>
</html>
